name: 签到

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 6,14 * * *'  # 北京时间 14:00、22:00（UTC+8，UTC时间对应6:00、14:00）
  workflow_dispatch:  # 新增：支持手动触发，方便测试
  watch:
    types: started

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4  # 升级到最新稳定版v4，替代旧版v2

      - name: 初始化Python
        uses: actions/setup-python@v5  # 升级到最新稳定版v5
        with:
          python-version: '3.11'  # 替换3.7为长期支持版3.11，彻底解决版本找不到问题
          cache: 'pip'  # 新增：开启pip缓存，加速依赖安装

      - name: 签到
        run: |
          # 升级pip到最新版，避免依赖安装报错
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          user='${{ secrets.USER }}'
          pwd='${{ secrets.PWD }}'
          
          user_list=()
          pwd_list=()

          IFS="#"

          for u in ${user[*]}
          do
          user_list[${#user_list[*]}]=${u}
          done

          for p in ${pwd[*]}
          do
          pwd_list[${#pwd_list[*]}]=${p}
          done

          user_num=${#user_list[*]}
          pwd_num=${#pwd_list[*]}

          if [ $user_num != $pwd_num ];then
          echo "账号和密码个数不对应"
          exit 1
          else
          echo "共有 $user_num 个账号，即将开始签到"
          fi

          for ((i=0;i<$user_num;i++))
          do
          python checkin.py <<EOF
          ${user_list[$i]}
          ${pwd_list[$i]}
          EOF
          done
