name: 天翼云盘签到

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 14 * * *'  # UTC 14:00 = 北京时间 22:00，每日1次签到
  workflow_dispatch:  # 支持手动触发测试
  watch:
    types: started

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 初始化Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 执行签到
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          user='${{ secrets.USER }}'
          pwd='${{ secrets.PWD }}'
          
          user_list=()
          pwd_list=()

          IFS="#"

          for u in ${user[*]}
          do
          user_list[${#user_list[*]}]=${u}
          done

          for p in ${pwd[*]}
          do
          pwd_list[${#pwd_list[*]}]=${p}
          done

          user_num=${#user_list[*]}
          pwd_num=${#pwd_list[*]}

          if [ $user_num != $pwd_num ];then
          echo "❌ 账号和密码个数不对应"
          exit 1
          else
          echo "ℹ️ 共有 $user_num 个账号，即将开始签到"
          fi

          for ((i=0;i<$user_num;i++))
          do
          echo "ℹ️ 正在执行第 $((i+1)) 个账号签到"
          python checkin.py <<EOF
          ${user_list[$i]}
          ${pwd_list[$i]}
          EOF
          done
